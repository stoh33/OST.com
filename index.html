<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OST.com - Lotto Recommender</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-actions">
                <button id="themeToggle" class="theme-btn" aria-label="Toggle Theme">
                    <span class="icon">☀️</span>
                </button>
            </div>
            <h1 class="love-message">채윤공주님 사랑해 ❤️❤️❤️</h1>
        </header>
        
        <main>
            <div class="lotto-card">
                <h2>행운의 로또 번호 추천</h2>
                <p>버튼을 눌러 5세트의 행운 번호를 받아보세요!</p>
                <button id="generateBtn" class="premium-btn">번호 생성하기</button>
                
                <div id="lottoResults" class="results-container">
                    <!-- Numbers will appear here -->
                    <div class="placeholder">행운을 빕니다!</div>
                </div>
            </div>
        </main>
    </div>
    <script src="main.js" defer></script>
</body>
</html>
